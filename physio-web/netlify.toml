[build]
command = "echo 'Static site - no build needed'"
functions = "backend"
publish = "frontend"
base = "physio-web"

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/:splat"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[build.environment]
ENVIRONMENT = "production"

[functions]
node_bundler = "esbuild"
